<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Task Manager</h1>

<form action="task" method="post">

</form>

<form action="task" method="get">

</form>

</body>
</html>
